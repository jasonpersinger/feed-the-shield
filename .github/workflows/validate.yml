name: Validate OPML

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate OPML files
        run: python3 scripts/validate.py --timeout 25 --max-age-days 120
